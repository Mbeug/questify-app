spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:questify_db}
    username: ${POSTGRES_USER:questify}
    password: ${POSTGRES_PASSWORD:questify}
  jpa:
    hibernate:
      ddl-auto: update   # Sprint 0: crée/maj les tables à partir des @Entity
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Firebase (push notifications) ──
# Path to the Firebase service account JSON file
# Download from: Firebase Console > Project Settings > Service Accounts > Generate New Private Key
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  enabled: ${FIREBASE_ENABLED:false}

# ── Quest reminders ──
questify:
  reminders:
    enabled: ${REMINDERS_ENABLED:true}
    # How many hours before dueDate to send a reminder
    hours-before: ${REMINDERS_HOURS_BEFORE:24}

# ── Google OAuth (social login) ──
# Set this to your Google OAuth Client ID (from Google Cloud Console)
google:
  client-id: ${GOOGLE_CLIENT_ID:}
