name: frontend
description: "Questify - Gamified task management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  http: ^1.5.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.4
  intl: ^0.19.0
  # Google Calendar
  google_sign_in: ^6.2.2
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  # Apple Sign-In
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  # Push notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  # Charts (radar chart for profile skills)
  fl_chart: ^0.69.2
  # Shared preferences (theme persistence)
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
